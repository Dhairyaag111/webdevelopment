<!DOCTYPE html>
<html lang="en">

<head>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: black;
            color: white;
            font-family: cursive;
        }

        .main {
            padding: 20px;
            margin-top: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .heading {
            font-size: 30px;
        }

        .animation {
            position: relative;
            bottom: 50px;
            font-size: 35px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .bar1 {
            width: 500px;
            height: 8px;
            background-color: grey;
            border-radius: 10px;
            overflow: hidden;
        }

        .bar2 {
            height: 100%;
            width: 0%;
            background-color: rgb(255, 51, 0);
            border-radius: 10px;
        }

        button {
            font-size: 20px;
            padding: 5px 50px;
            border-radius: 10px;
            border: transparent;
            background-color: grey;
        }

        button:active {
            background-color: white;
        }
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div class="main">
        <div class="heading">
            <h3>Loading</h3>
        </div>
        <div class="animation">
            <h2>0%</h2>
            <div class="bar1">
                <div class="bar2"></div>
            </div>
        </div>
        <div class="click">
            <button type="submit">LOAD</button>
        </div>
    </div>
    <script>
        document.querySelector("button").onclick = () => {
            let percentage = 0
            let breadth = 0
            let interval = setInterval(loader, 40)
            function loader() {
                percentage = percentage + 1
                breadth = breadth + 1
                if (percentage <= 100) {
                    document.querySelector("h2").innerText = percentage + "%"
                }
                document.querySelector(".bar2").style.width = breadth + "%"
                if (percentage > 100) {
                    clearInterval(interval)
                }
            }
        }
    </script>
</body>

</html>
